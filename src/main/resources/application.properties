spring.application.name=PrepTrack
server.port=8080

# ==========================================
#  MySQL DataSource
#  !! Replace password with your own !!
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/preptrack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
#  JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==========================================
#  JWT Configuration
#  Secret must be Base64-encoded, >= 256 bits
#  !! Replace with your own strong secret in production !!
# ==========================================
app.jwt.secret=UHJlcFRyYWNrU2VjcmV0S2V5Rm9ySlRXVG9rZW5HZW5lcmF0aW9uMjAyNlByZXBUcmFja1BsYXRmb3Jt
app.jwt.expiration=86400000

# ==========================================
#  SpringDoc / Swagger UI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================================
#  Logging
# ==========================================
logging.level.com.PrepTrack_AI=DEBUG
logging.level.org.springframework.security=INFO
